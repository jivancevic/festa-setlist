<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gig — Setlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0a10; --bg2:#15121d; --panel:#1b1726; --panel2:#221d30;
    --line:#322a42; --txt:#f3eefb; --mut:#9a90ad; --mut2:#6f6682;
    --gold:#e8b04b; --gold-d:#3a2e16;
    --a:#e8b04b;   --a-d:#3a2e16;   /* performer A */
    --b:#42c8c0;   --b-d:#0f3331;   /* performer B */
    --both:#b07bff; --both-d:#2c1d44;/* both */
    --display:'Fraunces',Georgia,serif;
    --ui:'DM Sans',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--ui); background:
      radial-gradient(120% 60% at 50% -10%, #221934 0%, transparent 60%),
      var(--bg);
    color:var(--txt); min-height:100vh; padding-bottom:84px;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:var(--ui); cursor:pointer; border:none; background:none; color:inherit}
  input,textarea,select{font-family:var(--ui); font-size:16px}
  .hide{display:none!important}

  /* Header */
  header{
    position:sticky; top:0; z-index:30; padding:14px 16px 10px;
    background:linear-gradient(180deg,#15101f 70%, rgba(21,16,31,0));
    backdrop-filter:blur(8px);
  }
  .brand{display:flex; align-items:baseline; gap:9px}
  .brand h1{font-family:var(--display); font-weight:600; font-size:24px; margin:0; letter-spacing:-.5px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .brand small{color:var(--mut); font-size:12.5px; margin-left:auto; font-weight:500}

  /* Search */
  .search{margin-top:11px; position:relative}
  .search input{
    width:100%; padding:13px 14px 13px 42px; border-radius:13px;
    background:var(--panel); border:1px solid var(--line); color:var(--txt); outline:none;
  }
  .search input:focus{border-color:var(--gold)}
  .search svg{position:absolute; left:14px; top:13px; opacity:.5}
  .filters{display:flex; gap:7px; margin-top:9px; overflow-x:auto; -webkit-overflow-scrolling:touch}
  .chip{padding:7px 13px; border-radius:20px; background:var(--panel); border:1px solid var(--line);
    color:var(--mut); font-size:13px; font-weight:600; white-space:nowrap}
  .chip.on{color:var(--bg); }
  .chip.on[data-f="all"]{background:var(--gold); border-color:var(--gold)}
  .chip.on[data-f="a"]{background:var(--a); border-color:var(--a)}
  .chip.on[data-f="b"]{background:var(--b); border-color:var(--b)}
  .chip.on[data-f="both"]{background:var(--both); border-color:var(--both); color:#fff}

  main{padding:6px 14px 20px}

  /* Song rows */
  .count{color:var(--mut2); font-size:12.5px; margin:10px 2px 6px; font-weight:600; text-transform:uppercase; letter-spacing:.6px}
  .row{
    display:flex; align-items:center; gap:12px; padding:13px 13px; border-radius:14px;
    background:var(--panel); margin-bottom:8px; border:1px solid transparent; position:relative;
  }
  .row:active{background:var(--panel2)}
  .bar{width:4px; align-self:stretch; border-radius:4px; flex:0 0 4px}
  .bar.a{background:var(--a)} .bar.b{background:var(--b)} .bar.both{background:var(--both)}
  .row .nm{flex:1; min-width:0}
  .row .nm b{font-weight:600; font-size:16px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row .nm span{color:var(--mut); font-size:12.5px}
  .key{font-family:var(--display); font-weight:600; font-size:17px; padding:5px 11px; border-radius:9px;
    background:var(--panel2); min-width:42px; text-align:center}
  .key.a{color:var(--a); background:var(--a-d)}
  .key.b{color:var(--b); background:var(--b-d)}
  .key.both{color:var(--both); background:var(--both-d)}
  .setdots{display:flex; gap:3px; position:absolute; right:11px; bottom:7px}
  .setdots i{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.85}
  .empty{color:var(--mut2); text-align:center; padding:50px 20px; font-size:14.5px; line-height:1.6}

  /* Set cards */
  .infocard{background:linear-gradient(135deg,#1e1830,#181323); border:1px solid var(--line);
    border-radius:14px; padding:13px 15px; margin-bottom:12px}
  .infocard b{font-family:var(--display); font-size:15px}
  .infocard p{margin:5px 0 0; color:var(--mut); font-size:13px; line-height:1.5}
  .setcard{background:var(--panel); border:1px solid var(--line); border-radius:16px; margin-bottom:13px; overflow:hidden}
  .sethead{display:flex; align-items:center; gap:11px; padding:14px 15px}
  .sethead .t{flex:1}
  .sethead .time{font-family:var(--display); font-weight:600; font-size:20px; color:var(--gold); min-width:58px}
  .sethead .t b{display:block; font-size:16px; font-weight:600}
  .sethead .t small{color:var(--mut); font-size:12.5px; display:block; margin-top:2px; line-height:1.45}
  .prog{font-size:12.5px; font-weight:700; padding:5px 10px; border-radius:9px; background:var(--panel2); color:var(--mut)}
  .prog.ok{background:var(--gold-d); color:var(--gold)}
  .setsongs{padding:0 12px 12px}
  .ss{display:flex; align-items:center; gap:10px; padding:10px 11px; background:var(--panel2);
    border-radius:11px; margin-bottom:7px}
  .ss .nb{width:22px; text-align:center; color:var(--mut2); font-weight:700; font-size:13px; flex:0 0 22px}
  .ss .info{flex:1; min-width:0}
  .ss .info b{font-weight:600; font-size:15px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ss .mini{font-family:var(--display); font-weight:600; font-size:14px; padding:3px 8px; border-radius:7px; background:var(--panel)}
  .ss .mini.a{color:var(--a)} .ss .mini.b{color:var(--b)} .ss .mini.both{color:var(--both)}
  .ssbtn{padding:6px 8px; color:var(--mut2); font-size:18px; line-height:1}
  .setfoot{display:flex; gap:8px; margin-top:3px}
  .addbtn{flex:1; padding:12px; background:var(--gold-d); color:var(--gold); font-weight:700; border-radius:11px; font-size:14.5px}
  .addbtn:active{filter:brightness(1.2)}
  .playbtn{flex:0 0 52px; padding:12px; background:var(--panel2); color:var(--txt); font-weight:700; border-radius:11px; font-size:15px; border:1px solid var(--line)}
  .pkrow{display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:12px; background:var(--panel); margin-bottom:7px; border:1px solid transparent}
  .pkrow.in{border-color:var(--gold)}
  .pkrow .nm{flex:1; min-width:0}
  .pkrow .nm b{font-weight:600; font-size:15px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .pkrow .nm span{color:var(--mut); font-size:12px}
  .pkadd{font-size:20px; font-weight:700; width:30px; text-align:center; color:var(--gold)}
  .playset{width:100%; padding:12px; background:var(--gold-d); color:var(--gold); font-weight:700;
    border-radius:11px; font-size:14.5px; margin-top:3px}
  .playset:active{filter:brightness(1.2)}

  /* Bottom nav */
  nav{position:fixed; bottom:0; left:0; right:0; z-index:40; display:flex;
    background:#120e1b; border-top:1px solid var(--line); padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
  nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--mut2); font-size:11px; font-weight:600; padding:4px}
  nav button.on{color:var(--gold)}
  nav button svg{width:23px;height:23px}

  /* Detail / Performance overlay */
  .ov{position:fixed; inset:0; z-index:60; background:var(--bg); display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .25s ease; visibility:hidden}
  .ov.show{transform:translateY(0); visibility:visible}
  .ovbar{display:flex; align-items:center; gap:12px; padding:14px 16px calc(8px); border-bottom:1px solid var(--line)}
  .ovbar .close{font-size:26px; line-height:1; color:var(--mut); width:30px}
  .ovbar .grow{flex:1; min-width:0}
  .ovbar .grow b{font-family:var(--display); font-size:19px; font-weight:600; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ovbar .grow small{color:var(--mut); font-size:12.5px}
  .keybig{font-family:var(--display); font-weight:700; font-size:26px; padding:6px 14px; border-radius:11px; background:var(--panel2)}
  .keybig.a{color:var(--a);background:var(--a-d)} .keybig.b{color:var(--b);background:var(--b-d)} .keybig.both{color:var(--both);background:var(--both-d)}
  .lyrics{flex:1; overflow-y:auto; padding:20px 18px 40px; white-space:pre-wrap; line-height:1.55;
    font-size:var(--lsz,22px); -webkit-overflow-scrolling:touch}
  .lyrics.empty2{color:var(--mut2); font-style:italic; font-size:16px}
  .ovctrl{display:flex; align-items:center; gap:10px; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); background:#120e1b}
  .ovctrl .sz{display:flex; gap:6px}
  .ovctrl .sz button{width:38px;height:38px;border-radius:10px;background:var(--panel);font-size:18px;font-weight:700;color:var(--txt)}
  .navbtn{flex:1; padding:13px; border-radius:12px; background:var(--panel); font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center; gap:6px}
  .navbtn.main{background:var(--gold-d); color:var(--gold)}
  .navbtn:disabled{opacity:.3}
  .pos{font-size:13px; color:var(--mut); font-weight:700; min-width:46px; text-align:center}

  /* Edit / forms */
  .field{margin-bottom:13px}
  .field label{display:block; font-size:12.5px; color:var(--mut); font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px}
  .field input,.field textarea,.field select{width:100%; padding:12px 13px; border-radius:11px; background:var(--panel); border:1px solid var(--line); color:var(--txt); outline:none}
  .field textarea{min-height:160px; resize:vertical; line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
  .singpick{display:flex; gap:8px}
  .singpick button{flex:1; padding:11px; border-radius:11px; background:var(--panel); border:1px solid var(--line); font-weight:600; font-size:14px; color:var(--mut)}
  .singpick button.on.a{background:var(--a-d); color:var(--a); border-color:var(--a)}
  .singpick button.on.b{background:var(--b-d); color:var(--b); border-color:var(--b)}
  .singpick button.on.both{background:var(--both-d); color:var(--both); border-color:var(--both)}
  .setpick{display:flex; flex-wrap:wrap; gap:8px}
  .setpick button{padding:9px 13px; border-radius:11px; background:var(--panel); border:1px solid var(--line); font-size:13.5px; font-weight:600; color:var(--mut); display:flex; gap:7px; align-items:center}
  .setpick button.on{background:var(--gold-d); color:var(--gold); border-color:var(--gold)}
  .btn{display:block; width:100%; padding:14px; border-radius:13px; font-weight:700; font-size:15px; text-align:center}
  .btn.primary{background:var(--gold); color:#1a1206}
  .btn.ghost{background:var(--panel); color:var(--txt); border:1px solid var(--line)}
  .btn.danger{background:#3a1620; color:#ff8095; border:1px solid #5a2030}
  .btn+.btn{margin-top:9px}
  .sec{font-family:var(--display); font-weight:600; font-size:19px; margin:20px 2px 12px}
  .hint{color:var(--mut2); font-size:13px; line-height:1.6; margin:0 2px 12px}
  .hint code{background:var(--panel); padding:2px 6px; border-radius:5px; color:var(--gold); font-size:12.5px}
  .toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--gold); color:#1a1206; padding:11px 18px; border-radius:12px; font-weight:700; font-size:14px; z-index:90; transition:.25s; pointer-events:none}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .two{display:flex; gap:10px}
  .two>*{flex:1}
  .rowtekst{flex:0 0 34px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:var(--panel2);border:1px solid var(--line);font-size:16px;text-decoration:none}
  .rowtekst:active{filter:brightness(1.3)}
  .chk{width:34px;height:34px;border-radius:9px;background:var(--panel2);color:var(--mut2);font-size:15px;font-weight:700;border:1px solid var(--line);flex:0 0 34px}
  .chk.on{background:var(--gold-d);color:var(--gold);border-color:var(--gold)}
  .row.played{opacity:.45}
  .row.played .nm b{text-decoration:line-through}
  .ss.played{opacity:.45}
  .navbtn.on{background:var(--gold-d);color:var(--gold)}
  .ovscroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .recs{padding:10px 14px 28px;border-top:1px solid var(--line)}
  .recs-h{font-size:11.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:6px 2px 9px}
  .rec{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;font-size:14px;font-weight:600;color:var(--txt)}
  .rec.played{opacity:.5;text-decoration:line-through}
  .rec span{color:var(--mut);font-family:var(--display);font-weight:600}
</style>

<header>
  <div class="brand">
    <span class="dot"></span>
    <h1>Fešta</h1>
    <small id="hdrcount">0 pjesama</small>
  </div>
  <div class="search" id="searchWrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" placeholder="Traži pjesmu…" autocomplete="off" autocorrect="off">
  </div>
  <div class="filters" id="filters">
    <button class="chip on" data-f="all">Sve</button>
    <button class="chip" data-f="a" id="fa">Josip</button>
    <button class="chip" data-f="b" id="fb">Pjero</button>
    <button class="chip" data-f="both">Oba</button>
    <button class="chip" data-f="todo">Za odsvirati</button>
    <button class="chip" data-f="done">Otpjevano</button>
    <button class="chip" data-f="noset">Bez seta</button>
  </div>
</header>

<main>
  <div id="view-songs"></div>
  <div id="view-sets" class="hide"></div>
  <div id="view-add" class="hide"></div>
</main>

<nav>
  <button data-tab="songs" class="on" id="t-songs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    Pjesme</button>
  <button data-tab="sets" id="t-sets">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    Setovi</button>
  <button data-tab="add" id="t-add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    Unos</button>
</nav>

<!-- Song detail / edit overlay -->
<div class="ov" id="detail">
  <div class="ovbar">
    <button class="close" data-act="closeDetail">✕</button>
    <div class="grow"><b id="d-name">—</b><small id="d-sub"></small></div>
    <button class="navbtn" style="flex:0;padding:9px 13px;background:var(--panel)" data-act="editSong">Uredi</button>
  </div>
  <div class="ovscroll" id="d-scroll">
    <div class="lyrics" id="d-lyrics"></div>
    <div class="recs" id="d-recs"></div>
  </div>
  <div class="ovctrl">
    <button class="navbtn" id="d-played" data-act="playedDetail" style="flex:0;padding:13px 14px">Otpjevano?</button>
    <div class="sz"><button data-act="szm">A−</button><button data-act="szp">A+</button></div>
    <a class="navbtn" id="d-tekst" target="_blank" rel="noopener" style="flex:0;padding:13px 15px;text-decoration:none;white-space:nowrap">📄 Tekst ↗</a>
    <button class="navbtn main" data-act="perfFromDetail">▶ Sviraj</button>
  </div>
</div>

<!-- Edit overlay -->
<div class="ov" id="edit">
  <div class="ovbar">
    <button class="close" data-act="closeEdit">✕</button>
    <div class="grow"><b id="e-title">Nova pjesma</b></div>
    <button class="navbtn" style="flex:0;padding:9px 16px;background:var(--gold);color:#1a1206;font-weight:700" data-act="saveSong">Spremi</button>
  </div>
  <div class="lyrics" style="display:block;padding:18px">
    <div class="field"><label>Naziv</label><input id="e-name" placeholder="Ime pjesme"></div>
    <div class="field"><label>Tonalitet</label><input id="e-key" placeholder="npr. A, Em, C#…"></div>
    <div class="field"><label>Pjeva</label>
      <div class="singpick" id="e-sing">
        <button data-s="a" class="a">Josip</button>
        <button data-s="b" class="b">Pjero</button>
        <button data-s="both" class="both">Oba</button>
      </div>
    </div>
    <div class="field"><label>U setovima</label><div class="setpick" id="e-sets"></div></div>
    <div class="field"><label>Tekst</label><textarea id="e-lyrics" placeholder="Zalijepi tekst pjesme…"></textarea></div>
    <button class="btn danger" data-act="delSong">Obriši pjesmu</button>
    <div style="height:30px"></div>
  </div>
</div>

<!-- Add-to-set picker overlay -->
<div class="ov" id="pick">
  <div class="ovbar">
    <button class="close" data-act="closePick">✕</button>
    <div class="grow"><b id="pk-title">Dodaj u set</b><small id="pk-sub"></small></div>
  </div>
  <div class="search" style="margin:10px 14px 4px;position:relative">
    <input id="pk-q" placeholder="Traži pjesmu za dodati…" autocomplete="off" autocorrect="off">
  </div>
  <div class="lyrics" id="pk-list" style="display:block;padding:8px 14px 40px"></div>
</div>

<!-- Performance overlay -->
<div class="ov" id="perf">
  <div class="ovbar">
    <button class="close" data-act="closePerf">✕</button>
    <div class="grow"><b id="p-name">—</b><small id="p-set"></small></div>
    <button class="navbtn" id="p-played" data-act="playedPerf" style="flex:0;padding:8px 11px" title="Otpjevano">✓</button>
    <a class="navbtn" id="p-tekst" target="_blank" rel="noopener" style="flex:0;padding:8px 11px;text-decoration:none;font-size:18px" title="Tekst">📄</a>
    <span class="keybig" id="p-key">—</span>
  </div>
  <div class="lyrics" id="p-lyrics"></div>
  <div class="ovctrl">
    <button class="navbtn" data-act="prev" id="p-prev">‹ Prošla</button>
    <div class="sz"><button data-act="szm">A−</button><button data-act="szp">A+</button></div>
    <span class="pos" id="p-pos">1/1</span>
    <button class="navbtn main" data-act="next" id="p-next">Iduća ›</button>
  </div>
</div>

<button id="fab" data-act="newSong" style="position:fixed;right:16px;bottom:96px;z-index:45;width:56px;height:56px;border-radius:50%;background:var(--gold);color:#1a1206;font-size:30px;font-weight:700;box-shadow:0 6px 20px rgba(232,176,75,.4);display:flex;align-items:center;justify-content:center">+</button>

<div class="toast" id="toast"></div>

<script>
/* ---------- State ---------- */
const KEY='gigdata_v1';
const DATA_VERSION=4;
const SETS_VERSION=2;
/* --- standalone build: localStorage fallback for window.storage --- */
if(!window.storage){
  window.storage={
    get:(k)=>{try{const v=localStorage.getItem(k);return v==null?null:{value:v};}catch(e){return null;}},
    set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}
  };

async function load(){
  try{
    const r=await window.storage.get(KEY);
    if(r&&r.value){ const d=JSON.parse(r.value); S=Object.assign(S,d); S.settings=Object.assign({a:'Josip',b:'Pjero',avg:3.5,lsz:22},d.settings||{}); }
  }catch(e){ /* first run */ }
  let seeded=false;
  if(!S.songs||!S.songs.length){ S.songs=JSON.parse(JSON.stringify(SEED_SONGS)); seeded=true; }
  if(!S.sets||!S.sets.length){ S.sets=JSON.parse(JSON.stringify(DEF_SETS)); seeded=true; }
  if((S.seedV||0)<DATA_VERSION){
    const byId=Object.fromEntries(SEED_SONGS.map(s=>[s.id,s]));
    S.songs.forEach(s=>{const sd=byId[s.id]; if(sd){ if(sd.src)s.src=sd.src; if(sd.mood)s.mood=sd.mood; if(sd.lyrics&&!s.lyrics)s.lyrics=sd.lyrics; }});
    S.seedV=DATA_VERSION; seeded=true;
  }
  /* one-time forced sets refresh (bump SETS_VERSION to push corrected sets); after this, live set edits persist */
  if((S.setsV||0)<SETS_VERSION){ S.sets=JSON.parse(JSON.stringify(DEF_SETS)); S.setsV=SETS_VERSION; seeded=true; }
  if(!S.played)S.played={};
  if(seeded) save();
  applySettings();
}

/* ---------- Live sync (ntfy.sh, keyless) ---------- */
let playedTs=0, _sse=null, _synced=false; const _seen=new Set();
function buildEdits(){ const seedById=Object.fromEntries(SEED_SONGS.map(s=>[s.id,s])); const e={}; (S.songs||[]).forEach(s=>{ const sd=seedById[s.id]; if(!sd){ e[s.id]={name:s.name,key:s.key||'',sing:s.sing}; return; } if((s.key||'')!==(sd.key||'')||s.sing!==sd.sing||s.name!==sd.name){ e[s.id]={key:s.key||'',sing:s.sing}; if(s.name!==sd.name)e[s.id].name=s.name; } }); return e; }
function applyEdits(e){ if(!e||typeof e!=='object')return; for(const id in e){ const ed=e[id]; const s=S.songs.find(x=>x.id===id); if(s){ if('key'in ed)s.key=ed.key; if('sing'in ed)s.sing=ed.sing; if('name'in ed)s.name=ed.name; } else { S.songs.push({id,name:ed.name||id,key:ed.key||'',sing:ed.sing||'a',lyrics:''}); } } }
function applyPayload(o,isLive){ if(!o||typeof o!=='object')return; if(o.map&&(o.ts||0)>=playedTs)S.played=o.map; if(isLive){ if(Array.isArray(o.sets)&&o.sets.length)S.sets=o.sets; if(o.edits)applyEdits(o.edits); } if((o.ts||0)>playedTs)playedTs=o.ts||0; try{localStorage.setItem('gig_played',JSON.stringify({map:S.played,ts:playedTs}));}catch(e){} save(); renderSongs(); renderSets(); updatePlayedBtns(); }
function handleMsg(m){ if(!m||m.event!=='message'||!m.message)return; let o; try{o=JSON.parse(m.message);}catch(e){return;} const id=m.id||''; const isLive=_synced&&!!id&&!_seen.has(id); /* live = an id not seen at load -> immune to device clock differences */ if(id)_seen.add(id); applyPayload(o,isLive); }
async function syncPullOnce(){ try{ const r=await fetch(NTFY+'/json?poll=1&since=12h',{cache:'no-store'}); const t=await r.text(); t.trim().split('\n').filter(Boolean).forEach(l=>{try{handleMsg(JSON.parse(l));}catch(e){}});}catch(e){} }
async function syncInit(){
  try{const c=JSON.parse(localStorage.getItem('gig_played')||'null'); if(c){playedTs=c.ts||0; S.played=c.map||{};}}catch(e){}
  await syncPullOnce();   /* baseline: marks current message ids as seen; sets/edits NOT applied yet */
  _synced=true;           /* from now, any unseen id is a genuine live push */
  try{ _sse=new EventSource(NTFY+'/sse'); _sse.onmessage=(e)=>{try{handleMsg(JSON.parse(e.data));}catch(err){}}; }catch(e){}
  setInterval(syncPullOnce, 30000); /* SSE is the live channel; this is just a slow backup (5s was burning the rate-limit budget) */
  renderAll(); updatePlayedBtns();
}
async function pushState(){ playedTs=Math.max(Date.now(),playedTs+1); try{localStorage.setItem('gig_played',JSON.stringify({map:S.played,ts:playedTs}));}catch(e){} const body=JSON.stringify({map:S.played||{},sets:S.sets,edits:buildEdits(),ts:playedTs}); for(let a=0;a<2;a++){ try{ const r=await fetch(NTFY,{method:'POST',body}); if(r.ok)return true; if(r.status===429)await new Promise(x=>setTimeout(x,2000)); }catch(e){ await new Promise(x=>setTimeout(x,1500)); } } return false; }
let _pushT; function queuePush(){ clearTimeout(_pushT); _pushT=setTimeout(pushState,1200); } /* debounce: coalesce rapid edits into one publish (saves rate-limit budget) */
const pushPlayed=pushState; // back-compat
function togglePlayed(id){ if(!S.played)S.played={}; if(S.played[id])delete S.played[id]; else S.played[id]=1; queuePush(); renderSongs(); renderSets(); updatePlayedBtns(); }

/* ---------- Import logic ---------- */
function mapSinger(raw){
  raw=(raw||'').trim().toLowerCase();
  if(!raw) return 'a';
  if(/oba|both|duet|zajedno/.test(raw)) return 'both';
  if(raw===norm(S.settings.b)||raw==='b'||raw==='p'||raw.startsWith(S.settings.b.toLowerCase().slice(0,3))) return 'b';
  if(raw===norm(S.settings.a)||raw==='a'||raw==='j'||raw.startsWith(S.settings.a.toLowerCase().slice(0,3))) return 'a';
  return 'a';
}
function importSongs(){
  const txt=document.getElementById('bulk').value;
  let lines=txt.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines[0]&&/naziv|name|pjesma/i.test(lines[0])&&/(ton|key|pjeva|sing)/i.test(lines[0])) lines.shift();
  let added=0,upd=0;
  lines.forEach(l=>{
    let parts;
    if(l.includes('\t')) parts=l.split('\t');
    else if(l.includes('|')) parts=l.split('|');
    else parts=l.split(',');
    parts=parts.map(p=>p.trim());
    const name=parts[0]; if(!name) return;
    const key=parts[1]||''; const sing=mapSinger(parts[2]);
    const ex=S.songs.find(s=>norm(s.name)===norm(name));
    if(ex){ if(key)ex.key=key; ex.sing=sing; upd++; }
    else{ S.songs.push({id:uid(),name,key,sing,lyrics:''}); added++; }
  });
  save(); renderAll();
  document.getElementById('bulk').value='';
  toast(added+' dodano · '+upd+' ažurirano');
}
function importLyrics(){
  const txt=document.getElementById('bulkL').value; if(!txt.trim()){toast('Prazno');return;}
  let blocks=[];
  if(/^##\s/m.test(txt)){
    txt.split(/^##\s+/m).forEach(b=>{b=b.trim();if(!b)return;const nl=b.indexOf('\n');blocks.push({title:b.slice(0,nl<0?b.length:nl).trim(),body:nl<0?'':b.slice(nl+1).trim()});});
  }else{
    txt.split(/^\s*-{3,}\s*$/m).forEach(b=>{b=b.trim();if(!b)return;const nl=b.indexOf('\n');blocks.push({title:b.slice(0,nl<0?b.length:nl).trim(),body:nl<0?'':b.slice(nl+1).trim()});});
  }
  let matched=0,created=0;
  blocks.forEach(bl=>{
    if(!bl.title)return;
    const ex=S.songs.find(s=>norm(s.name)===norm(bl.title));
    if(ex){ex.lyrics=bl.body;matched++;}
    else{S.songs.push({id:uid(),name:bl.title,key:'',sing:'a',lyrics:bl.body});created++;}
  });
  save(); renderAll();
  document.getElementById('bulkL').value='';
  toast(matched+' spojeno · '+created+' novih');
}

function moveInSet(setId,songId,dir){

}
function toggleSet(setId){
  const st=S.sets.find(x=>x.id===setId);const i=st.songIds.indexOf(curSong.id);
  if(i>=0)st.songIds.splice(i,1);else st.songIds.push(curSong.id);
  save();queuePush();
  document.querySelectorAll('#e-sets [data-toset]').forEach(b=>b.classList.toggle('on',S.sets.find(x=>x.id===b.dataset.toset).songIds.includes(curSong.id)));
}

/* ---------- Add-to-set picker ---------- */
let pickSet=null;
function openPick(setId){
  pickSet=setId; const st=S.sets.find(x=>x.id===setId); if(!st)return;
  document.getElementById('pk-title').textContent='Dodaj u: '+st.name.split('—')[0].trim();
  document.getElementById('pk-q').value='';
  renderPick();
  document.getElementById('pick').classList.add('show');
  setTimeout(()=>document.getElementById('pk-q').focus(),200);
}
function renderPick(){
  const st=S.sets.find(x=>x.id===pickSet); if(!st)return;
  const q=norm(document.getElementById('pk-q').value);
  let list=S.songs.slice().sort((a,b)=>a.name.localeCompare(b.name,'hr'));
  if(q) list=list.filter(s=>norm(s.name).includes(q));
  document.getElementById('pk-sub').textContent=st.songIds.length+' u setu';
  document.getElementById('pk-list').innerHTML=list.slice(0,250).map(s=>{
    const inset=st.songIds.includes(s.id);
    return `<div class="pkrow ${inset?'in':''}" data-pick="${s.id}"><div class="bar ${s.sing}"></div><div class="nm"><b>${esc(s.name)}</b><span>${esc(singLabel(s.sing))} · ${esc(s.key||'–')}</span></div><span class="pkadd">${inset?'✓':'＋'}</span></div>`;
  }).join('')||'<div style="color:var(--mut2);padding:20px;text-align:center">Nema rezultata.</div>';
}
function pickToggle(id){
  const st=S.sets.find(x=>x.id===pickSet); if(!st)return;
  const i=st.songIds.indexOf(id);
  if(i>=0){st.songIds.splice(i,1);toast('Maknuto iz seta');}else{st.songIds.push(id);toast('Dodano u set');}
  save(); queuePush(); renderPick(); renderSets();
}

/* ---------- Lyrics auto-fit ----------
   Popuni ekran: laptop -> više stupaca + font skaliran da cijela pjesma stane
   bez scrolla; mobitel -> max teksta (1-2 stupca), a ako ne stane ni na min
   font -> jednostupčano s malo vertikalnog scrolla. A-/A+ = zoom (lzoom). */
function fitLyrics(el, outer){
  if(!el) return;
  if(el.classList.contains('empty2')||!el.textContent.trim()){
    ['columnCount','columnGap','columnFill','fontSize','lineHeight','overflow','height'].forEach(p=>el.style[p]='');
    return;
  }
  // outer = tekst je u vanjskom scroll spremniku (detail): ciljaj jedan ekran,
  // a ako pjesma ne stane -> pusti je da naraste pa vanjski scroll vodi do preporuka.
  if(outer){ const sc=el.parentElement; el.style.height=sc.clientHeight+'px'; }
  else el.style.height='';
  const W=el.clientWidth, H=el.clientHeight; if(!W||!H) return;
  const zoom=S.settings.lzoom||1;
  const wide=W>=720;
  const maxCols=Math.max(1, Math.min(wide?3:2, Math.floor(W/(wide?340:300))));
  const MAXF=wide?40:30, MINF=14;
  el.style.lineHeight='1.4'; el.style.columnGap='36px'; el.style.columnFill='auto'; el.style.overflow='hidden';
  // "stane" = ni horizontalno (prelio u dodatne stupce) ni vertikalno -> nikad ne reže tekst
  const ok=()=> el.scrollWidth<=el.clientWidth+2 && el.scrollHeight<=el.clientHeight+2;
  const fits=(c,f)=>{ el.style.columnCount=c; el.style.fontSize=f+'px'; return ok(); };
  let best=null;
  for(let c=1;c<=maxCols;c++){
    let lo=MINF,hi=MAXF,fit=0;
    while(lo<=hi){ const m=(lo+hi)>>1; if(fits(c,m)){fit=m;lo=m+1;} else hi=m-1; }
    if(fit && (!best || fit>=best.font)) best={cols:c, font:fit};
  }
  // ne stane jedan ekran: detail -> raste (visina auto), vanjski scroll; perf -> vlastiti scroll
  const grow=(f)=>{ el.style.columnCount=''; el.style.columnGap=''; el.style.columnFill=''; el.style.fontSize=f+'px';
    if(outer){ el.style.height='auto'; el.style.overflow='visible'; } else el.style.overflow='hidden auto'; };
  if(best){
    const f=Math.round(best.font*zoom);
    el.style.columnCount=best.cols; el.style.fontSize=f+'px';
    if(ok()) el.style.overflow='hidden';        // sve stalo na jedan ekran, bez scrolla
    else grow(f);                               // zoom prelio
  } else { grow(wide?20:18); }                  // ne stane ni na min font
}
function refitOpen(){
  if(document.getElementById('perf').classList.contains('show')) fitLyrics(document.getElementById('p-lyrics'));
  else if(document.getElementById('detail').classList.contains('show')) fitLyrics(document.getElementById('d-lyrics'), true);
}
function sz(d){ S.settings.lzoom=Math.max(0.5,Math.min(2.5, Math.round(((S.settings.lzoom||1)+(d>0?0.1:-0.1))*10)/10)); save(); refitOpen(); }
let _refitT; window.addEventListener('resize',()=>{clearTimeout(_refitT);_refitT=setTimeout(refitOpen,150);});

/* ---------- Tabs ---------- */
function tab(name){
  ['songs','sets','add'].forEach(t=>{
    document.getElementById('view-'+t).classList.toggle('hide',t!==name);
    document.getElementById('t-'+t).classList.toggle('on',t===name);
  });
  document.getElementById('searchWrap').parentElement.querySelectorAll('.search,.filters').forEach(e=>e.style.display=name==='songs'?'':'none');
  document.getElementById('fab').style.display=name==='songs'?'flex':'none';
}

/* ---------- Events ---------- */
document.getElementById('q').addEventListener('input',e=>{query=e.target.value;renderSongs();});
document.getElementById('pk-q').addEventListener('input',renderPick);
document.getElementById('filters').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;filter=b.dataset.f;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c===b));renderSongs();});
document.querySelector('nav').addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(b)tab(b.dataset.tab);});

document.body.addEventListener('click',e=>{
  const tk=e.target.closest('[data-tekst]'); if(tk){return;}
  const chk=e.target.closest('[data-chk]'); if(chk){e.stopPropagation();togglePlayed(chk.dataset.chk);return;}
  const row=e.target.closest('[data-song]'); if(row){openDetail(row.dataset.song);return;}
  const a=e.target.closest('[data-act]'); if(a){act(a.dataset.act);return;}
  const up=e.target.closest('[data-up]'); if(up){const[s,g]=up.dataset.up.split('|');moveInSet(s,g,-1);return;}
  const dn=e.target.closest('[data-down]'); if(dn){const[s,g]=dn.dataset.down.split('|');moveInSet(s,g,1);return;}
  const rm=e.target.closest('[data-rem]'); if(rm){const[s,g]=rm.dataset.rem.split('|');const st=S.sets.find(x=>x.id===s);st.songIds=st.songIds.filter(i=>i!==g);save();queuePush();renderSets();return;}
  const pl=e.target.closest('[data-play]'); if(pl){const st=S.sets.find(x=>x.id===pl.dataset.play);startPerf(st.songIds.slice(),st.name.split('—')[0].trim());return;}
  const ad=e.target.closest('[data-addto]'); if(ad){openPick(ad.dataset.addto);return;}
  const pk=e.target.closest('[data-pick]'); if(pk){pickToggle(pk.dataset.pick);return;}
  const ts=e.target.closest('[data-toset]'); if(ts){toggleSet(ts.dataset.toset);return;}
  const sg=e.target.closest('#e-sing [data-s]'); if(sg){curSong.sing=sg.dataset.s;document.querySelectorAll('#e-sing button').forEach(b=>b.classList.toggle('on',b===sg));return;}
});

function act(a){
  switch(a){
    case 'closeDetail':document.getElementById('detail').classList.remove('show');break;
    case 'newSong':openEdit(null);break;
    case 'closeEdit':document.getElementById('edit').classList.remove('show');break;
    case 'closePerf':document.getElementById('perf').classList.remove('show');relWake();break;
    case 'closePick':document.getElementById('pick').classList.remove('show');break;
    case 'editSong':document.getElementById('detail').classList.remove('show');openEdit(curSong.id);break;
    case 'saveSong':saveSong();break;
    case 'delSong':delSong();break;
    case 'perfFromDetail':document.getElementById('detail').classList.remove('show');startPerf([curSong.id],'Pjesma');break;
    case 'playedDetail':togglePlayed(curSong.id);renderRecs(curSong);break;
    case 'playedPerf':togglePlayed(perf.ids[perf.i]);break;
    case 'pushMine':(async()=>{toast('Šaljem…');const ok=await pushState();toast(ok?'Poslano ✓':'⚠️ Nije poslano (limit/mreža). Probaj opet ili promijeni mrežu.');})();break;
    case 'resetPlayed':if(confirm('Resetirati sve „otpjevano” oznake (za oba telefona)?')){S.played={};pushState();renderAll();updatePlayedBtns();toast('Resetirano');}break;
    case 'prev':step(-1);break;
    case 'next':step(1);break;
    case 'szp':sz(2);break;
    case 'szm':sz(-2);break;
    case 'importSongs':importSongs();break;
    case 'importLyrics':importLyrics();break;
    case 'saveSettings':
      S.settings.a=document.getElementById('set-a').value.trim()||'Josip';
      S.settings.b=document.getElementById('set-b').value.trim()||'Pjero';
      S.settings.avg=parseFloat(document.getElementById('set-avg').value)||3.5;
      applySettings();save();renderAll();toast('Postavke spremljene');break;
    case 'exportData':
      navigator.clipboard.writeText(JSON.stringify(S)).then(()=>toast('Backup kopiran u clipboard')).catch(()=>{prompt('Kopiraj ovo:',JSON.stringify(S));});break;
    case 'importData':
      const t=prompt('Zalijepi backup JSON:');if(t){try{S=Object.assign(S,JSON.parse(t));applySettings();save();renderAll();toast('Vraćeno');}catch(e){toast('Neispravan JSON');}}break;
  }
}
